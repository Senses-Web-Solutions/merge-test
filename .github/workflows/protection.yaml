name: Enforce Release Merge Policy

on:
  pull_request:

jobs:
  enforce-branch-policy:
    runs-on: ubuntu-latest
    permissions:
      statuses: write

    steps:
      - name: Validate source branch for release merges
        run: |
          SRC="${GITHUB_HEAD_REF}"
          DEST="${GITHUB_BASE_REF}"

          echo "Source branch: $SRC"
          echo "Target branch: $DEST"

          # Only enforce rules when merging into teamleaf-10-release
          if [[ "$DEST" == "teamleaf-10-release" ]]; then

            # Allowed: teamleaf-10 or teamleaf-10/*
            if [[ "$SRC" == "teamleaf-10" ]] || [[ "$SRC" =~ ^teamleaf-10/ ]]; then
              echo "✔ Allowed: $SRC originates from teamleaf-10"
              exit 0
            fi

            # Allowed: branches created from teamleaf-10-release
            if [[ "$SRC" =~ ^teamleaf-10-release ]]; then
              echo "✔ Allowed: $SRC originates from teamleaf-10-release"
              exit 0
            fi

            # Otherwise reject
            echo "❌ ERROR: Branch '$SRC' is not allowed to merge into teamleaf-10-release."
            echo "Allowed sources:"
            echo "  - teamleaf-10"
            echo "  - teamleaf-10/*"
            echo "  - teamleaf-10-release*"
            exit 1
          fi

          echo "✔ Not a release PR — no restrictions."
